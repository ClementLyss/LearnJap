services:
  db:
    image: postgres:16-alpine
    container_name: learnjap-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: learnjap
      POSTGRES_PASSWORD: learnjap_dev
      POSTGRES_DB: learnjap
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
